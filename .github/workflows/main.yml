name: 构建预设

on:
  push:
    branches:
      - main  # 监听 main 分支的推送，根据需要修改
  workflow_dispatch: # 允许手动点击按钮触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 或者你需要的版本
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run build
        run: npm run build

      - name: Get version and short sha
        id: vars
        run: |
          # 提取 package.json 版本号
          VERSION=$(node -p "require('./package.json').version")
          # 提取 7 位短 hash
          SHORT_SHA=${GITHUB_SHA::7}

          # 写入环境变量供后续步骤使用
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV

          # 拼接完整的新文件名
          echo "NEW_FILENAME=双人成行-v${VERSION}-${SHORT_SHA}.json" >> $GITHUB_ENV

      - name: Rename release file
        run: |
          if [ -f "release/双人成行.json" ]; then
            mv "release/双人成行.json" "release/${{ env.NEW_FILENAME }}"
          else
            echo "Error: release/双人成行.json not found!"
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          # 下载时的压缩包名称
          name: ${{ env.NEW_FILENAME }}
          # 具体文件路径
          path: release/${{ env.NEW_FILENAME }}
          retention-days: 90
