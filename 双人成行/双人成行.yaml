# yaml-language-server: $schema=https://testingcf.jsdelivr.net/gh/StageDog/tavern_sync/dist/schema/preset.zh.json
设置:
  上下文长度: 2000000
  最大回复token数: 30000
  流式传输: true
  温度: 1
  频率惩罚: 0
  存在惩罚: 0
  top_p: 0.98
  top_k: 64
  压缩系统消息: false
  推理强度: 自动
  请求思维链: true
  请求图片: false
  启用函数调用: false
  启用网络搜索: false
  允许发送图片: 禁用
  允许发送视频: false
  角色名称前缀: 默认

锚点:
  enable: &enable
    启用: true
  disable: &disable
    启用: false
  相对: &相对
    插入位置:
      类型: 相对
  system: &system
    角色: 系统
  ai: &ai
    角色: AI
  user: &user
    角色: 用户


